edition: 3.0.0
name: code-certs.dengchao.fun
access: default
vars:
  region: cn-shenzhen
resources:
  website:
    component: fc3
    actions:
      pre-deploy:
        - plugin: website-fc-serve
          args:
            index: index.html
    props:
      region: ${vars.region}
      functionName: code-certs-dengchao-fun
      description: "Code: Certs 官网静态站点"
      timeout: 60
      memorySize: 512
      instanceConcurrency: 100
      code: ./.output/public
  website_domain:
    component: fc3-domain
    props:
      region: ${vars.region}
      domainName: auto
      protocol: HTTP
      routeConfig:
        routes:
          - path: /*
            functionName: code-certs-dengchao-fun
